{% extends "base.html" %}

{% block content %}
  <h1>Deck Review Council</h1>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  {% if archive_runs %}
    <section class="archive-loader">
      <label>
        Archived runs
        <select id="archive-select">
          <option value="">Select an archived run...</option>
          {% for run in archive_runs %}
            <option value="{{ run }}">{{ run }}</option>
          {% endfor %}
        </select>
      </label>
      <p id="archive-status"></p>
    </section>
  {% endif %}

  <form method="post" action="/review" id="review-form">
    <div class="controls">
      <label>
        Model
        <select name="model">
          {% for option in model_options %}
            <option value="{{ option.value }}" {% if settings.model == option.value %}selected{% endif %}>
              {{ option.label }}
            </option>
          {% endfor %}
        </select>
      </label>

      <label>
        Reasoning effort
        <select name="reasoning_effort">
          {% for option in effort_options %}
            <option value="{{ option.value }}" {% if settings.reasoning_effort == option.value %}selected{% endif %}>
              {{ option.label }}
            </option>
          {% endfor %}
        </select>
      </label>

      <label>
        Search context
        <select name="search_context_size">
          {% for option in search_context_options %}
            <option value="{{ option.value }}" {% if settings.search_context_size == option.value %}selected{% endif %}>
              {{ option.label }}
            </option>
          {% endfor %}
        </select>
      </label>

      <label class="checkbox">
        <input
          type="checkbox"
          name="enable_web_search"
          {% if settings.enable_web_search %}checked{% endif %}
        >
        Web search
      </label>
    </div>

    <textarea
      name="deck_outline"
      rows="24"
      placeholder="Paste pitch deck outline here..."
    >{{ deck_outline or "" }}</textarea>

    <button type="submit">Run Review</button>
  </form>

  <section id="stream-area" class="stream-area" hidden>
    <div class="stream-header">
      <h2>Streaming Results</h2>
      <p id="stream-status">Starting...</p>
    </div>
    <div id="results-grid" class="results-grid"></div>
  </section>

  <script>
    const form = document.querySelector("#review-form");
    const archiveSelect = document.querySelector("#archive-select");
    const archiveStatus = document.querySelector("#archive-status");
    const deckOutline = document.querySelector("textarea[name='deck_outline']");
    const streamArea = document.querySelector("#stream-area");
    const statusEl = document.querySelector("#stream-status");
    const grid = document.querySelector("#results-grid");

    function escapeText(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function reviewerId(name) {
      return "reviewer-" + name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
    }

    function renderPendingCard(name) {
      const details = document.createElement("details");
      details.className = "review artifact pending";
      details.id = reviewerId(name);
      details.innerHTML = `
        <summary>${escapeText(name)}</summary>
        <pre class="progress-log">Waiting...</pre>
      `;
      grid.appendChild(details);
    }

    function renderProgress(event) {
      const artifact = document.querySelector(`#${CSS.escape(reviewerId(event.reviewer))}`);
      if (!artifact) {
        return;
      }

      const log = artifact.querySelector(".progress-log");
      if (!log) {
        return;
      }

      const marker = event.status === "completed" ? "[x]" : event.status === "failed" ? "[!]" : "[ ]";
      log.textContent += `\n${marker} ${event.message}`;
    }

    function renderResult(result) {
      let artifact = document.querySelector(`#${CSS.escape(reviewerId(result.name.replace(" failed", "")))}`);
      if (!artifact) {
        artifact = document.createElement("details");
        grid.appendChild(artifact);
      }

      const sources = (result.sources || []).map((source) => (
        `<li><a href="${escapeText(source.url)}">${escapeText(source.title)}</a></li>`
      )).join("");
      const reasoning = result.reasoning_summary
        ? `<details class="reasoning"><summary>Reasoning summary</summary><pre>${escapeText(result.reasoning_summary)}</pre></details>`
        : "";
      const metadata = result.response_metadata
        ? `<details class="metadata"><summary>Response metadata</summary><pre>${escapeText(typeof result.response_metadata === "string" ? result.response_metadata : JSON.stringify(result.response_metadata, null, 2))}</pre></details>`
        : "";

      artifact.className = "review artifact";
      artifact.open = false;
      artifact.innerHTML = `
        <summary>${escapeText(result.name)}</summary>
        ${reasoning}
        ${metadata}
        <pre>${escapeText(result.text || "")}</pre>
        ${sources ? `<h3>Sources</h3><ul class="sources">${sources}</ul>` : ""}
      `;
    }

    function setSelectValue(name, value) {
      const control = form.querySelector(`[name="${name}"]`);
      if (control && value) {
        control.value = value;
      }
    }

    function applyArchiveSettings(settings) {
      if (!settings) {
        return;
      }

      setSelectValue("model", settings.model);
      setSelectValue("reasoning_effort", settings.reasoning_effort);
      setSelectValue("search_context_size", settings.search_context_size);

      const webSearch = form.querySelector('[name="enable_web_search"]');
      if (webSearch) {
        webSearch.checked = Boolean(settings.enable_web_search);
      }
    }

    async function loadArchive(runId) {
      if (!runId) {
        return;
      }

      if (archiveStatus) {
        archiveStatus.textContent = "Loading...";
      }
      streamArea.hidden = false;
      grid.innerHTML = "";
      statusEl.textContent = "Loading archive...";

      const response = await fetch(`/archive/${encodeURIComponent(runId)}`);
      if (!response.ok) {
        const message = `Archive load failed: ${response.status}`;
        statusEl.textContent = message;
        if (archiveStatus) {
          archiveStatus.textContent = message;
        }
        return;
      }

      const archive = await response.json();
      deckOutline.value = archive.deck_outline || "";
      applyArchiveSettings(archive.settings);

      statusEl.innerHTML = `Loaded archive <code>${escapeText(archive.archive_dir)}</code>`;
      if (archiveStatus) {
        archiveStatus.textContent = `${archive.results.length} artifacts loaded.`;
      }

      archive.results.forEach(renderResult);
    }

    async function streamReview(event) {
      event.preventDefault();

      streamArea.hidden = false;
      grid.innerHTML = "";
      statusEl.textContent = "Starting...";

      const response = await fetch("/review-stream", {
        method: "POST",
        body: new FormData(form),
      });

      if (!response.ok || !response.body) {
        statusEl.textContent = `Request failed: ${response.status}`;
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) {
          break;
        }

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.trim()) {
            continue;
          }

          const event = JSON.parse(line);
          if (event.type === "start") {
            statusEl.innerHTML = `Reviewers running with ${event.worker_count} workers... Archived to <code>${escapeText(event.archive_dir)}</code>`;
            event.reviewers.forEach(renderPendingCard);
          } else if (event.type === "result") {
            renderResult(event.result);
          } else if (event.type === "progress") {
            renderProgress(event);
          } else if (event.type === "error") {
            statusEl.textContent = event.message;
          } else if (event.type === "done") {
            statusEl.textContent = "Done.";
          }
        }
      }
    }

    form.addEventListener("submit", streamReview);
    if (archiveSelect) {
      archiveSelect.addEventListener("change", (event) => loadArchive(event.target.value));
    }
  </script>
{% endblock %}
